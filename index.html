<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IntelliDoc — AI RAG Assistant</title>
    <meta name="description"
    content="IntelliDoc: A premium three-mode RAG assistant — document-only, document + AI knowledge, and live web search. Created by Muhammad Yasir." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* ── Core palette ── */
            --canvas: #0a0a0f;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-glass: rgba(255, 255, 255, 0.05);
            --surface-glass-2: rgba(255, 255, 255, 0.08);
            --surface-hover: rgba(255, 255, 255, 0.10);

            /* ── Gradient accents ── */
            --accent-1: #7c3aed;
            --accent-2: #06b6d4;
            --accent-3: #a855f7;
            --gradient: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            --gradient-soft: linear-gradient(135deg, rgba(124, 58, 237, 0.15), rgba(6, 182, 212, 0.15));
            --gradient-text: linear-gradient(135deg, var(--accent-3), var(--accent-2));

            /* ── Text ── */
            --text: #f0f0f5;
            --text-muted: rgba(240, 240, 245, 0.55);
            --text-dimmed: rgba(240, 240, 245, 0.35);

            /* ── Borders ── */
            --border: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(124, 58, 237, 0.3);

            /* ── Functional ── */
            --error: #ef4444;
            --success: #22c55e;

            /* ── Sizing ── */
            --sidebar-w: 260px;
            --radius: 12px;
            --radius-sm: 8px;
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 14px;
            color: var(--text);
            background: var(--canvas);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ═══════════════════════════════════════════════════════
           LAYOUT
           ═══════════════════════════════════════════════════════ */
        #app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ═══════════════════════════════════════════════════════
           SIDEBAR
           ═══════════════════════════════════════════════════════ */
        #sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: var(--surface-glass);
            backdrop-filter: blur(24px) saturate(1.5);
            -webkit-backdrop-filter: blur(24px) saturate(1.5);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Subtle gradient glow on left edge */
        #sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: var(--gradient);
            opacity: 0.6;
        }

        /* ── Sidebar Header ── */
        #sidebar-header {
            padding: 28px 20px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* ── Centered brand group ── */
        .brand-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .brand-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            margin-bottom: 10px;
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 12px rgba(124, 58, 237, 0.3);
            }

            50% {
                box-shadow: 0 0 24px rgba(124, 58, 237, 0.5), 0 0 48px rgba(6, 182, 212, 0.2);
            }
        }

        #sidebar-header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
            margin: 0;
        }

        .brand-tagline {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-top: 2px;
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: inline-block;
        }

        /* ── Sidebar Sections ── */
        .sidebar-section {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-dimmed);
            margin-bottom: 10px;
        }

        /* ── Mode Selector ── */
        .mode-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 400;
            color: var(--text-muted);
            transition: all 0.2s ease;
            user-select: none;
            position: relative;
        }

        .mode-option:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .mode-option input[type="radio"] {
            display: none;
        }

        .mode-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--border);
            flex-shrink: 0;
            transition: all 0.25s ease;
            position: relative;
        }

        .mode-option.active {
            color: var(--text);
            background: var(--surface-glass-2);
        }

        .mode-option.active .mode-dot {
            border-color: var(--accent-1);
            background: var(--accent-1);
            box-shadow: 0 0 8px rgba(124, 58, 237, 0.5);
        }

        .mode-option.active .mode-dot::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: white;
        }

        .mode-desc {
            display: block;
            font-size: 10px;
            color: var(--text-dimmed);
            margin-top: 2px;
            font-weight: 400;
        }

        /* ── Upload Section ── */
        #upload-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #file-input {
            display: none;
        }

        #file-label {
            font-size: 12px;
            color: var(--text-muted);
            padding: 14px 12px;
            border: 1.5px dashed var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-align: center;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        #file-label:hover {
            border-color: var(--accent-1);
            background: rgba(124, 58, 237, 0.05);
            color: var(--text);
        }

        #file-label.has-file {
            border-color: var(--accent-2);
            background: rgba(6, 182, 212, 0.08);
            color: var(--accent-2);
        }

        .upload-icon {
            font-size: 20px;
            opacity: 0.7;
        }

        #btn-upload {
            height: 38px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 12.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.02em;
        }

        #btn-upload:hover {
            opacity: 0.9;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
            transform: translateY(-1px);
        }

        #btn-upload:disabled {
            background: var(--surface-glass-2);
            color: var(--text-dimmed);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #upload-status {
            font-size: 11px;
            color: var(--text-dimmed);
            line-height: 1.4;
            min-height: 14px;
        }

        #upload-status.ok {
            color: var(--success);
        }

        #upload-status.err {
            color: var(--error);
        }

        /* ── Sidebar Footer ── */
        .sidebar-footer {
            margin-top: auto;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            /* center all footer content */
            gap: 12px;
        }

        .social-links {
            display: flex;
            gap: 8px;
            justify-content: center;
            /* center the social icons */
        }

        .social-link {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            background: var(--surface-glass-2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .social-link:hover {
            background: var(--gradient);
            border-color: transparent;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.4);
        }

        .social-link svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .created-by {
            font-size: 10px;
            color: var(--text-dimmed);
            letter-spacing: 0.03em;
            text-align: center;
            /* center the text */
        }

        .created-by span {
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
        }

        /* ═══════════════════════════════════════════════════════
           MAIN AREA
           ═══════════════════════════════════════════════════════ */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--canvas);
            position: relative;
        }

        /* Subtle radial glow behind chat */
        #main::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Top Bar ── */
        #topbar {
            height: 52px;
            background: var(--surface-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 10px;
            flex-shrink: 0;
            z-index: 2;
        }

        .topbar-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
            animation: status-pulse 2s ease-in-out infinite;
        }

        @keyframes status-pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        #topbar-mode {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        #topbar-mode span {
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ── Chat Area ── */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 1;
            scroll-behavior: smooth;
        }

        /* Scrollbar */
        #chat::-webkit-scrollbar {
            width: 6px;
        }

        #chat::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat::-webkit-scrollbar-thumb {
            background: var(--surface-glass-2);
            border-radius: 3px;
        }

        #chat::-webkit-scrollbar-thumb:hover {
            background: var(--surface-hover);
        }

        /* ── Welcome Hero ── */
        .welcome-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px;
            flex: 1;
            animation: fadeInUp 0.6s ease;
        }

        .welcome-logo {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.3), 0 0 64px rgba(6, 182, 212, 0.15);
            animation: pulse-glow 3s ease-in-out infinite;
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            max-width: 400px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .welcome-hints {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 500px;
        }

        .hint-chip {
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--surface-glass-2);
            border: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .hint-chip:hover {
            background: var(--gradient-soft);
            border-color: var(--border-glow);
            color: var(--text);
            transform: translateY(-1px);
        }

        /* ── System Notice ── */
        .notice {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            padding: 10px 18px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface-glass);
            backdrop-filter: blur(8px);
            align-self: center;
            max-width: 460px;
            animation: fadeInUp 0.3s ease;
        }

        /* ── Message Bubbles ── */
        .msg-row {
            display: flex;
            flex-direction: column;
            max-width: 72%;
            animation: fadeInUp 0.35s ease;
        }

        .msg-row.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .msg-row.assistant {
            align-self: flex-start;
            align-items: flex-start;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bubble {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 13.5px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg-row.user .bubble {
            background: var(--gradient);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.25);
        }

        .msg-row.assistant .bubble {
            background: var(--surface-glass-2);
            backdrop-filter: blur(12px);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* ── Typing Indicator ── */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 18px;
            background: var(--surface-glass-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            border-bottom-left-radius: 4px;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--accent-1);
            border-radius: 50%;
            animation: typingBlink 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBlink {

            0%,
            80%,
            100% {
                opacity: 0.2;
                transform: scale(0.8);
            }

            40% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ── Sources Toggle ── */
        .sources-toggle {
            margin-top: 6px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-dimmed);
            cursor: pointer;
            user-select: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s ease;
        }

        .sources-toggle:hover {
            color: var(--text-muted);
        }

        .sources-toggle svg {
            transition: transform 0.2s ease;
        }

        .sources-toggle.open svg {
            transform: rotate(90deg);
        }

        .sources-list {
            display: none;
            flex-direction: column;
            gap: 4px;
            margin-top: 6px;
            padding: 10px 12px;
            background: var(--surface-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }

        .sources-list.visible {
            display: flex;
        }

        .sources-list a,
        .sources-list span {
            font-size: 11px;
            color: var(--text-muted);
            text-decoration: none;
            line-height: 1.5;
            word-break: break-all;
        }

        .sources-list a:hover {
            color: var(--accent-2);
            text-decoration: underline;
        }

        /* ── Input Bar ── */
        #input-bar {
            flex-shrink: 0;
            border-top: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            gap: 10px;
            background: var(--surface-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 2;
        }

        #question-input {
            flex: 1;
            height: 44px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 0 16px;
            font-family: inherit;
            font-size: 13.5px;
            color: var(--text);
            outline: none;
            background: var(--surface-glass-2);
            transition: all 0.25s ease;
        }

        #question-input::placeholder {
            color: var(--text-dimmed);
        }

        #question-input:focus {
            border-color: var(--accent-1);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15), 0 0 20px rgba(124, 58, 237, 0.1);
            background: var(--surface);
        }

        #btn-send {
            height: 44px;
            padding: 0 22px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #btn-send:hover {
            opacity: 0.9;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
            transform: translateY(-1px);
        }

        #btn-send:disabled {
            background: var(--surface-glass-2);
            color: var(--text-dimmed);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* ═══════════════════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════════════════ */
        @media (max-width: 768px) {
            #sidebar {
                display: none;
            }

            .welcome-title {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <div id="app">

        <!-- ── Sidebar ── -->
        <aside id="sidebar">
            <div id="sidebar-header">
                <div class="brand-group">
                    <h1>IntelliDoc</h1>
                    <div class="brand-tagline">AI RAG Assistant</div>
                </div>
            </div>

            <!-- Mode selector -->
            <div class="sidebar-section">
                <div class="sidebar-label">Response Mode</div>
                <label class="mode-option active" id="mode-label-1">
                    <input type="radio" name="mode" value="1" checked />
                    <span class="mode-dot"></span>
                    <div>Document Only<span class="mode-desc">Answers strictly from your PDF</span></div>
                </label>
                <label class="mode-option" id="mode-label-2">
                    <input type="radio" name="mode" value="2" />
                    <span class="mode-dot"></span>
                    <div>Document + AI<span class="mode-desc">PDF context enhanced with AI knowledge</span></div>
                </label>
                <label class="mode-option" id="mode-label-3">
                    <input type="radio" name="mode" value="3" />
                    <span class="mode-dot"></span>
                    <div>Web Search<span class="mode-desc">Live search results via Tavily</span></div>
                </label>
            </div>

            <!-- Upload section (hidden for mode 3) -->
            <div class="sidebar-section" id="upload-section">
                <div class="sidebar-label">Upload Document</div>
                <input type="file" id="file-input" accept=".pdf" />
                <label for="file-input" id="file-label">
                    <span class="upload-icon">📄</span>
                    Choose PDF to analyze
                </label>
                <button id="btn-upload">Upload & Index</button>
                <div id="upload-status">No document uploaded yet.</div>
            </div>

            <!-- Footer -->
            <div class="sidebar-footer">
                <div class="social-links">
                    <!-- LinkedIn -->
                    <a href="https://www.linkedin.com/in/yasirx9/" target="_blank" rel="noopener noreferrer" class="social-link"
                    title="LinkedIn">
                    <svg viewBox="0 0 24 24">
                        <path

<!-- ── Main ── -->
<main id="main">
    <div id="topbar">
        <div class="topbar-dot"></div>
        <span id="topbar-mode">Mode: <span id="mode-name">Document Only</span></span>
    </div>
    <div id="chat">
        <!-- Welcome hero inserted by JS -->
    </div>
    <div id="input-bar">
        <input id="question-input" type="text" placeholder="Ask anything about your document..." autocomplete="off" />
        <button id="btn-send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
        Send
    </button>
</div>
</main>

</div>
<script>
    // ── CHANGE THIS before deploying to Vercel ──
    const API_URL = "http://localhost:8000";

    const modeNames = { 1: "Document Only", 2: "Document + AI", 3: "Web Search" };
    let currentMode = 1;
    let hasMessages = false;

    const chat = document.getElementById("chat");
    const questionInput = document.getElementById("question-input");
    const btnSend = document.getElementById("btn-send");
    const btnUpload = document.getElementById("btn-upload");
    const fileInput = document.getElementById("file-input");
    const fileLabel = document.getElementById("file-label");
    const uploadStatus = document.getElementById("upload-status");
    const uploadSection = document.getElementById("upload-section");
    const modeNameEl = document.getElementById("mode-name");

    // ── Welcome Hero ──────────────────────────────────────
    function showWelcomeHero() {
        const hero = document.createElement("div");
        hero.className = "welcome-hero";
        hero.id = "welcome-hero";
        hero.innerHTML = `
        <div class="welcome-title">IntelliDoc</div>
        <div class="welcome-subtitle">
            Your AI-powered document assistant. Upload a PDF and ask questions —
            get answers from your document, enhanced with AI knowledge, or search the web.
        </div>
        <div class="welcome-hints">
            <div class="hint-chip" data-hint="Summarize the key points of the document">Summarize key points</div>
            <div class="hint-chip" data-hint="What are the main conclusions?">Main conclusions</div>
            <div class="hint-chip" data-hint="Explain the methodology used">Explain methodology</div>
            <div class="hint-chip" data-hint="What are the recommendations?">Recommendations</div>
        </div>
    `;
    chat.appendChild(hero);

    // Make hint chips clickable
    hero.querySelectorAll(".hint-chip").forEach(chip => {
        chip.addEventListener("click", () => {
            questionInput.value = chip.getAttribute("data-hint");
            questionInput.focus();
        });
    });
}

function removeWelcomeHero() {
    const hero = document.getElementById("welcome-hero");
    if (hero) hero.remove();
}

// ── Mode switching ──────────────────────────────────────
document.querySelectorAll('input[name="mode"]').forEach(radio => {
    radio.addEventListener("change", () => {
        currentMode = parseInt(radio.value);
        document.querySelectorAll(".mode-option").forEach(l => l.classList.remove("active"));
        document.getElementById(`mode-label-${currentMode}`).classList.add("active");
        modeNameEl.textContent = modeNames[currentMode];
        uploadSection.style.display = currentMode === 3 ? "none" : "";
        checkIndexStatus();
    });
});

// ── File picker label ───────────────────────────────────
fileInput.addEventListener("change", () => {
    if (fileInput.files.length) {
        fileLabel.innerHTML =
        `<span class="upload-icon">✅</span>${fileInput.files[0].name}`;
        fileLabel.classList.add("has-file");
    } else {
        fileLabel.innerHTML = `<span class="upload-icon">📄</span>Choose PDF to analyze`;
        fileLabel.classList.remove("has-file");
    }
});

// ── Upload ──────────────────────────────────────────────
btnUpload.addEventListener("click", async () => {
    if (!fileInput.files.length) return;
    btnUpload.disabled = true;
    btnUpload.textContent = "Processing...";
    uploadStatus.className = "";
    uploadStatus.textContent = "Indexing document...";
    const form = new FormData();
    form.append("file", fileInput.files[0]);
    try {
        const res = await fetch(`${API_URL}/ingest`, { method: "POST", body: form });
        const data = await res.json();
        if (res.ok) {
            uploadStatus.textContent = `✓ Indexed ${data.chunks} chunks successfully.`;
            uploadStatus.className = "ok";
            removeNotices();
        } else {
            uploadStatus.textContent = data.detail || "Upload failed.";
            uploadStatus.className = "err";
        }
    } catch (e) {
        uploadStatus.textContent = "Server unreachable.";
        uploadStatus.className = "err";
    } finally {
        btnUpload.disabled = false;
        btnUpload.textContent = "Upload & Index";
    }
});

// ── Health + index status on load ──────────────────────
async function checkIndexStatus() {
    if (currentMode === 3) return;
    try {
        const res = await fetch(`${API_URL}/index-status`);
        const data = await res.json();
        if (!data.indexed) showNotice("No document uploaded yet. Upload a PDF to start.");
    } catch { showNotice("Could not reach the server. Make sure the API is running."); }
}

function showNotice(msg) {
    removeNotices();
    const div = document.createElement("div");
    div.className = "notice";
    div.textContent = msg;
    chat.prepend(div);
}
function removeNotices() {
    chat.querySelectorAll(".notice").forEach(n => n.remove());
}

// ── Send message ────────────────────────────────────────
async function sendMessage() {
    const q = questionInput.value.trim();
    if (!q) return;

    if (!hasMessages) {
        removeWelcomeHero();
        hasMessages = true;
    }

    questionInput.value = "";
    appendUserMessage(q);
    const typingRow = appendTyping();
    btnSend.disabled = true;
    questionInput.disabled = true;
    try {
        const res = await fetch(`${API_URL}/ask`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: q, mode: currentMode }),
        });
        const data = await res.json();
        typingRow.remove();
        if (res.ok) appendAssistantMessage(data.answer, data.sources || []);
        else appendAssistantMessage(data.detail || "An error occurred.", []);
    } catch {
        typingRow.remove();
        appendAssistantMessage("Server unreachable. Make sure the API is running.", []);
    } finally {
        btnSend.disabled = false;
        questionInput.disabled = false;
        questionInput.focus();
    }
}

btnSend.addEventListener("click", sendMessage);
questionInput.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) sendMessage(); });

// ── DOM helpers ─────────────────────────────────────────
function appendUserMessage(text) {
    const row = document.createElement("div");
    row.className = "msg-row user";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    row.appendChild(bubble);
    chat.appendChild(row);
    scrollBottom();
}

function appendTyping() {
    const row = document.createElement("div");
    row.className = "msg-row assistant";
    row.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
    chat.appendChild(row);
    scrollBottom();
    return row;
}

function appendAssistantMessage(text, sources) {
    const row = document.createElement("div");
    row.className = "msg-row assistant";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    row.appendChild(bubble);

    if (sources && sources.length) {
        const toggle = document.createElement("div");
        toggle.className = "sources-toggle";
        toggle.innerHTML =
        `<svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M2 1l4 3-4 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Sources (${sources.length})`;

        const list = document.createElement("div");
        list.className = "sources-list";
        sources.forEach(src => {
            const item = document.createElement("div");
            const isUrl = src.startsWith("http");
            if (isUrl) {
                const a = document.createElement("a");
                a.href = src;
                a.target = "_blank";
                a.rel = "noopener noreferrer";
                a.textContent = src;
                item.appendChild(a);
            } else {
                const s = document.createElement("span");
                s.textContent = src;
                item.appendChild(s);
            }
            list.appendChild(item);
        });

        toggle.addEventListener("click", () => {
            toggle.classList.toggle("open");
            list.classList.toggle("visible");
        });

        row.appendChild(toggle);
        row.appendChild(list);
    }

    chat.appendChild(row);
    scrollBottom();
}

function scrollBottom() {
    chat.scrollTop = chat.scrollHeight;
}

// ── Init ────────────────────────────────────────────────
showWelcomeHero();
checkIndexStatus();
questionInput.focus();
</script>
</body>

</html>
